name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  src:
    name: src/ — typecheck + replay eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Replay eval (no API keys)
        run: bun run demo

  web:
    name: web/ — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check web/ exists
        id: webcheck
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.webcheck.outputs.exists == 'true'
        run: bun install --frozen-lockfile

      - name: Typecheck
        if: steps.webcheck.outputs.exists == 'true'
        run: bun run typecheck

      - name: Build
        if: steps.webcheck.outputs.exists == 'true'
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
